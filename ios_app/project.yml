name: LingbotCapture
options:
  bundleIdPrefix: com.lingbot
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    # Baked in here so `xcodegen generate` doesn't blow away the user's
    # signing config every time the project is regenerated. Update both
    # values here if you ever switch dev account / bundle id; do NOT change
    # them in Xcode (Xcode edits get overwritten by the next regen).
    DEVELOPMENT_TEAM: "35N786A628"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  LingbotCapture:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Lingbot Capture
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "Lingbot Capture uses the camera to record property walkthroughs for 3D reconstruction."
        NSMicrophoneUsageDescription: "Required by the camera framework even though no audio is recorded."
        NSPhotoLibraryUsageDescription: "Lingbot Capture saves captured bundles."
        UIRequiredDeviceCapabilities:
          - arkit
          - metal
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arielpollack.23d
        DEVELOPMENT_TEAM: "35N786A628"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
    dependencies:
      - package: ZIPFoundation

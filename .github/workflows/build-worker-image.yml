name: build-worker-image

# Build + push the lingbot-map serverless worker images to Docker Hub.
#
# Two images are produced from this single workflow run, sharing a tag
# suffix so they're trivially correlated:
#
#   arielpollack/lingbot-map-runpod-poc-base:gsplat-<run_id>
#   arielpollack/lingbot-map-runpod-poc:gsplat-app-<run_id>
#
# Why CI: the gsplat CUDA compile peaks at ~1 GB RAM per TU and runs ~25
# TUs. On a Mac that pushes the OrbStack VM to its memory limit and takes
# ~15 min in QEMU emulation. On GitHub's native amd64 ubuntu-latest
# runner (4 vCPU / 16 GB), the same compile is a fraction of the time
# AND the Mac stays free for actual work.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME — your Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token (NOT password). Create
#                        one at hub.docker.com → Account Settings →
#                        Personal access tokens. Read+Write+Delete scope.

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Tag suffix (default: gsplat-<UTC date>-<UTC time>)'
        required: false
        default: ''
      skip_app:
        description: 'Build base only (skip the thin app image layer)'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'poc/worker/Dockerfile'
      - 'poc/worker/Dockerfile.base'
      - 'poc/worker/requirements.txt'
      - 'pyproject.toml'
      - 'lingbot_map/**'
      - '.github/workflows/build-worker-image.yml'

env:
  BASE_IMAGE: arielpollack/lingbot-map-runpod-poc-base
  APP_IMAGE: arielpollack/lingbot-map-runpod-poc

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag_suffix }}" ]; then
            TAG="${{ inputs.tag_suffix }}"
          else
            TAG="gsplat-$(date -u +'%Y%m%d-%H%M')"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building tag: $TAG"

      # Aggressively free disk so the gsplat compile + push doesn't fail
      # halfway. The default ubuntu-latest image ships with ~25 GB of
      # preinstalled tooling we don't use; reclaiming it gives us ~50 GB
      # of headroom for the build cache + image layers.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: poc/worker/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ${{ env.BASE_IMAGE }}:${{ steps.tag.outputs.value }}
          # Cache layers across runs via the GHA cache backend. Massive
          # speedup on subsequent builds — only the layers whose RUN
          # command or dependencies changed get rebuilt.
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-app:
    needs: build-base
    if: ${{ !inputs.skip_app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push thin app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: poc/worker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_TAG=${{ needs.build-base.outputs.tag }}
          # The app image tag swaps `gsplat-` for `gsplat-app-` so the
          # base + app pair are easy to correlate in the registry.
          tags: ${{ env.APP_IMAGE }}:gsplat-app-${{ needs.build-base.outputs.tag == '' && 'unknown' || needs.build-base.outputs.tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Print image tags
        run: |
          echo "Base image: ${{ env.BASE_IMAGE }}:${{ needs.build-base.outputs.tag }}"
          echo "App image:  ${{ env.APP_IMAGE }}:gsplat-app-${{ needs.build-base.outputs.tag }}"
          echo ""
          echo "Next: update LINGBOT_WORKER_IMAGE in poc/worker/modal_app.py"
          echo "      then run: modal deploy poc/worker/modal_app.py"

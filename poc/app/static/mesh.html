<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingBot-Map Clay Mesh Viewer</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
      html, body, #viewer { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #121417; }
      #hud {
        position: fixed; top: 12px; left: 12px;
        background: rgba(10, 12, 16, 0.86); color: #e7e5df;
        font: 12px/1.4 system-ui, sans-serif;
        padding: 8px 10px; border-radius: 6px; z-index: 2;
        max-width: 420px;
      }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="hud">Loading clay mesh...</div>
    <div id="viewer"></div>
    <script type="importmap">
      {
        "imports": {
          "three": "/static/vendor/three/build/three.module.js",
          "three/addons/": "/static/vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/static/mesh.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingBot-Map Splat Viewer</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
      html, body, #viewer { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #111418; }
      #hud {
        position: fixed; top: 12px; left: 12px;
        background: rgba(10, 12, 16, 0.85); color: #e6e6e6;
        font: 12px/1.4 system-ui, sans-serif;
        padding: 8px 10px; border-radius: 6px; z-index: 2;
        max-width: 360px;
      }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="hud">Loading splat…</div>
    <div id="viewer"></div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/",
          "@mkkellogg/gaussian-splats-3d": "https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7?bundle&deps=three@0.164.1"
        }
      }
    </script>
    <script type="module" src="/static/splat.js"></script>
  </body>
</html>
